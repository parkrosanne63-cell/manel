<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="log.css">

</head>

<body>

  <!-- Background -->
  <div class="page-background"></div>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <!-- Card -->
  <div class="card-wrapper">
    <div class="login-card">

      <!-- Success overlay (hidden until login succeeds) -->
      <div class="success-overlay" id="successOverlay">
        <div class="success-icon">✓</div>
        <div class="success-title">Access Granted ✦</div>
        <div class="success-msg">Redirecting to your dashboard…</div>
      </div>

      <!-- Header -->
      <div class="card-header">
        <div class="logo-circle">
          <img src="logo.jpg" alt="logo" class="VORTEX">
        </div>
        <h1 class="card-title">Welcome back</h1>
        <p class="card-subtitle">Sign in to your account to continue</p>
      </div>

      <!-- Form -->
      <div class="form">

        <!-- Email -->
        <div class="field">
          <label class="field-label" for="emailInput">Email Address</label>
          <div class="field-input-wrap">
            <input type="email" id="emailInput" class="field-input" placeholder="you@example.com"
              autocomplete="email" />
            <span class="field-icon">✉️</span>
          </div>
          <span class="field-error" id="emailError">⚠ Please enter a valid email.</span>
        </div>

        <!-- Password -->
        <div class="field">
          <label class="field-label" for="passInput">Password</label>
          <div class="field-input-wrap">
            <input type="password" id="passInput" class="field-input" placeholder="Enter your password"
              autocomplete="current-password" />
            <button class="toggle-password" id="togglePass" type="button">👁</button>
          </div>
          <span class="field-error" id="passError">⚠ Password must be at least 6 characters.</span>
        </div>

        <!-- Remember me + Forgot password -->
        <div class="options-row">
          <label class="remember-label">
            <input type="checkbox" id="rememberMe" />
            <span class="custom-checkbox" id="checkboxDisplay"></span>
            Remember me
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <!-- Submit button -->
        <button class="btn-signin" id="loginBtn" type="button">
          <a href="mnll.html" class="btn-log"><span class="btn-text">Sign In</span></a>
          <span class="btn-spinner">
            <span class="spinner-circle"></span>
          </span>
        </button>

        <!-- Divider -->
        <div class="divider">
          <div class="divider-line"></div>
          <span class="divider-text">or sign in with</span>
          <div class="divider-line"></div>
        </div>

        <!-- Social login buttons -->
        <div class="social-row">
          <button class="btn-social">
            <svg width="16" height="16" viewBox="0 0 24 24">
              <path fill="#4285F4"
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
              <path fill="#34A853"
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
              <path fill="#FBBC05"
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
              <path fill="#EA4335"
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
            </svg>
            Google
          </button>
          <button class="btn-social">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="#1877F2">
              <path
                d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
            </svg>
            Facebook
          </button>
        </div>

        <!-- Sign up link -->
        <p class="signup-text">
          Don't have an account?
          <a href="#" class="signup-link">Create one free</a>
        </p>

      </div>
    </div>
  </div>


  <script src="l.js"></script>
</body>

</html>
